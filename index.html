<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Expert Challenge</title>
    <style>
        :root {
            --primary: #3DDC84; 
            --primary-dark: #073042;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #202124;
            --wrong: #ff8a80;
            --correct: #b9f6ca;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #5f6368;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .category-badge {
            background: var(--primary-dark);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .answers-grid {
            display: grid;
            gap: 12px;
            margin-top: 25px;
        }

        .answer-card {
            border: 2px solid #e0e0e0;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .answer-card:hover { border-color: var(--primary); background: #f1fdf6; }
        .answer-card.selected { border-color: var(--primary-dark); background: var(--primary); color: var(--primary-dark); font-weight: bold; }

        .letter-box {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }

        .btn-next { background: var(--primary-dark); color: white; }
        .btn-outline { background: #eee; color: #555; }
        
        #results-screen { display: none; text-align: center; }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 8px solid var(--primary);
        }

        .review-section {
            text-align: left;
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .review-item {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #fafafa;
        }

        .review-q { font-weight: bold; margin-bottom: 8px; display: block; }
        .ans-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-right: 5px;
        }
        .pill-wrong { background: var(--wrong); color: #b71c1c; }
        .pill-correct { background: var(--correct); color: #1b5e20; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <div class="meta-info">
            <span id="question-count"></span>
            <span id="category-label" class="category-badge"></span>
        </div>
        <div class="progress-container"><div id="progress-fill"></div></div>
        <div id="question-area"></div>
        <div class="controls">
            <button class="btn-outline" id="prevBtn" onclick="changeQuestion(-1)">Previous</button>
            <button class="btn-next" id="nextBtn" onclick="changeQuestion(1)">Next</button>
        </div>
    </div>

    <div id="results-screen">
        <h1>Test Complete!</h1>
        <div class="score-circle">
            <div style="font-size: 2rem; font-weight: 800;" id="final-percent">0%</div>
        </div>
        <div id="category-breakdown" style="margin-bottom: 20px;"></div>
        
        <div class="controls" style="justify-content: center; gap: 10px;">
            <button class="btn-outline" onclick="location.reload()">Restart</button>
            <button class="btn-next" id="reviewBtn" onclick="toggleReview()">Review Answers</button>
        </div>

        <div id="review-area" class="review-section" style="display:none;">
            </div>
    </div>
</div>

<script>
const rawQuestions = [
    {cat:"Basic",q:"What is the main app store for most Android devices?",a:["Google Play Store","Galaxy Store","Amazon Appstore","APKMirror"],c:0},
    {cat:"Basic",q:"Which gesture usually opens the notification panel?",a:["Swipe up","Swipe down from top","Double tap screen","Pinch screen"],c:1},
    {cat:"Basic",q:"What does airplane mode primarily do?",a:["Boost WiFi speed","Disable wireless connections","Increase battery","Block ads"],c:1},
    {cat:"Basic",q:"Which button shows all recently used apps?",a:["Back","Home","Recents/Overview","Power"],c:2},
    {cat:"Basic",q:"What is the purpose of the Play Protect feature?",a:["Scan apps for malware","Backup photos","Improve battery","Increase storage"],c:0},
    {cat:"Basic",q:"What happens when you clear an app's cache?",a:["Delete the app","Delete temporary files","Erase account","Factory reset"],c:1},
    {cat:"Basic",q:"Which feature allows installing apps from outside Play Store?",a:["Developer Mode","Unknown Sources / Install unknown apps","Root Access","Recovery Mode"],c:1},
    {cat:"Basic",q:"What does long-pressing an app icon often allow?",a:["Uninstall or app shortcuts","Increase RAM","Boost CPU","Encrypt phone"],c:0},
    {cat:"Basic",q:"What is Android primarily based on?",a:["Linux kernel","Windows kernel","BSD kernel","Chrome kernel"],c:0},
    {cat:"Basic",q:"Which setting controls automatic screen rotation?",a:["Screen cast","Auto rotate","Night light","Adaptive brightness"],c:1},
    {cat:"Intermediate",q:"What does 'Do Not Disturb' mode do?",a:["Blocks all internet","Silences notifications and calls","Deletes alerts","Disables Bluetooth"],c:1},
    {cat:"Intermediate",q:"Which Android feature splits the screen between two apps?",a:["Picture in Picture","Split Screen","Dual Window Mode","Focus Mode"],c:1},
    {cat:"Intermediate",q:"What does 'Adaptive Battery' attempt to do?",a:["Increase charging speed","Reduce background power use","Extend screen brightness","Improve signal"],c:1},
    {cat:"Intermediate",q:"Which Android component manages permissions for apps?",a:["Google Play Services","Android System","Package Manager","System UI"],c:2},
    {cat:"Intermediate",q:"What file format are Android apps normally packaged as?",a:["EXE","APK","IPA","DMG"],c:1},
    {cat:"Intermediate",q:"What is the purpose of Safe Mode on Android?",a:["Disable system updates","Run system without third-party apps","Improve performance permanently","Backup apps"],c:1},
    {cat:"Intermediate",q:"Which feature lets apps appear in a small floating window while using another app?",a:["Overlay / Picture-in-Picture","Smart Lock","Nearby Share","Fast Pair"],c:0},
    {cat:"Intermediate",q:"What does 'Factory Reset' do?",a:["Removes all user data and restores defaults","Reinstalls Play Store only","Deletes cache","Clears SD card"],c:0},
    {cat:"Intermediate",q:"Which Android feature automatically fills saved passwords?",a:["Smart Lock for Passwords","Google Password Manager Autofill","Android Keychain","Credential Sync"],c:1},
    {cat:"Intermediate",q:"Which storage type is usually faster in modern Android phones?",a:["eMMC","UFS","MicroSD","Optical"],c:1},
    {cat:"Advanced",q:"What is 'root access' on Android?",a:["Administrator-level control","Ability to update apps","Network debugging","App sandbox"],c:0},
    {cat:"Advanced",q:"What component starts Android before the operating system loads?",a:["Kernel Module","Bootloader","Runtime Engine","Play Services"],c:1},
    {cat:"Advanced",q:"Which partition stores the Android operating system?",a:["system partition","data partition","cache partition","vendor partition"],c:0},
    {cat:"Advanced",q:"What does unlocking the bootloader allow?",a:["Installing custom firmware","Faster internet","Extra RAM","Dual SIM"],c:0},
    {cat:"Advanced",q:"Which command interface allows debugging via USB?",a:["ADB","SSH","FTP","RPC"],c:0},
    {cat:"Advanced",q:"What is the purpose of recovery mode?",a:["Install updates and maintenance tasks","Improve battery","Install apps","Encrypt storage"],c:0},
    {cat:"Advanced",q:"Which Android runtime replaced Dalvik?",a:["ART","JRE","CLR","V8"],c:0},
    {cat:"Advanced",q:"What does 'OEM unlocking' setting permit?",a:["Bootloader unlocking","WiFi sharing","Faster charging","Dual apps"],c:0},
    {cat:"Advanced",q:"Which security model isolates apps from each other?",a:["Sandboxing","Hypervisor mode","Virtual threads","Memory swap"],c:0},
    {cat:"Advanced",q:"What Android feature lets devices share files directly over WiFi/Bluetooth?",a:["Nearby Share","Smart Cast","Android Beam+","DirectSync"],c:0},
    {cat:"Expert",q:"What is the purpose of the 'vendor' partition?",a:["Stores hardware-specific drivers and binaries","User data","Google apps","Boot configuration"],c:0},
    {cat:"Expert",q:"Which mechanism verifies system integrity during boot?",a:["Verified Boot","Secure UI","AppArmor","SELinux"],c:0},
    {cat:"Expert",q:"What is the function of SELinux in Android?",a:["Mandatory access control security","Wireless encryption","App store scanning","CPU management"],c:0},
    {cat:"Expert",q:"What does 'A/B partition system updates' enable?",a:["Seamless updates without downtime","Dual SIM support","Parallel app installs","GPU acceleration"],c:0},
    {cat:"Expert",q:"Which component handles low-level hardware interaction?",a:["Linux kernel","System UI","Launcher","Dalvik"],c:0},
    {cat:"Expert",q:"What is 'Project Treble' designed to improve?",a:["Modular system updates","Gaming performance","Camera quality","Battery speed"],c:0},
    {cat:"Expert",q:"Which process manages application lifecycle in Android?",a:["Activity Manager","Task Scheduler","Kernel Manager","Package Builder"],c:0},
    {cat:"Expert",q:"What Android feature encrypts user data by default on modern devices?",a:["File-based encryption","Disk mirroring","Swap encryption","Runtime locking"],c:0},
    {cat:"Expert",q:"Which framework component handles graphical rendering?",a:["SurfaceFlinger","RenderEngine","SystemUI","OpenLauncher"],c:0},
    {cat:"Expert",q:"What Android project separates hardware abstraction layers?",a:["Project Treble","Project Mainline","Project Butter","Project Loom"],c:0},
    {cat:"PowerUser",q:"What does 'ADB sideload' typically do?",a:["Install update packages via recovery","Root the device","Delete system apps","Install Play Store"],c:0},
    {cat:"PowerUser",q:"Which Android feature updates system modules through Play Store?",a:["Project Mainline","ART Runtime","Treble Core","Kernel Sync"],c:0},
    {cat:"PowerUser",q:"Which component controls the Android home screen?",a:["Launcher","Kernel UI","Surface Manager","Activity Root"],c:0},
    {cat:"PowerUser",q:"What is 'fastboot' mainly used for?",a:["Flashing partitions from bootloader mode","Clearing RAM","Improving WiFi","Backing up apps"],c:0},
    {cat:"PowerUser",q:"Which Android mechanism limits background app activity?",a:["App Standby Buckets","Foreground Services","Task Freeze","Wake Control"],c:0},
    {cat:"PowerUser",q:"What type of permission is required for location access while app is closed?",a:["Background location permission","System permission","Runtime root permission","Device owner permission"],c:0},
    {cat:"PowerUser",q:"Which file contains a list of installed packages?",a:["packages.xml","system.conf","appindex.dat","install.cfg"],c:0},
    {cat:"PowerUser",q:"What Android feature prevents rollback to insecure OS versions?",a:["Rollback protection","Version fuse","Secure downgrade block","Kernel guard"],c:0},
    {cat:"PowerUser",q:"Which subsystem manages camera access in Android?",a:["Camera HAL","Media runtime","Surface stack","Lens daemon"],c:0},
    {cat:"PowerUser",q:"Which permission group includes camera and microphone privacy controls?",a:["Dangerous permissions","Normal permissions","Signature permissions","Special permissions"],c:0}
];

// Shuffle everything to stop 'A' dominance
const questions = rawQuestions.map(item => {
    let answers = [...item.a];
    let correctText = answers[item.c];
    for (let i = answers.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [answers[i], answers[j]] = [answers[j], answers[i]];
    }
    return { ...item, a: answers, c: answers.indexOf(correctText) };
});

let currentIdx = 0;
let userAnswers = new Array(questions.length).fill(null);

function renderQuestion() {
    const q = questions[currentIdx];
    document.getElementById("question-count").innerText = `Question ${currentIdx + 1} of ${questions.length}`;
    document.getElementById("category-label").innerText = q.cat;
    document.getElementById("progress-fill").style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
    document.getElementById("prevBtn").disabled = currentIdx === 0;
    document.getElementById("nextBtn").innerText = currentIdx === questions.length - 1 ? "Finish" : "Next";

    let html = `<h2>${q.q}</h2><div class="answers-grid">`;
    q.a.forEach((opt, idx) => {
        const sel = userAnswers[currentIdx] === idx ? 'selected' : '';
        html += `<div class="answer-card ${sel}" onclick="selectOption(${idx})">
                    <div class="letter-box">${String.fromCharCode(65+idx)}</div>${opt}
                 </div>`;
    });
    document.getElementById("question-area").innerHTML = html + `</div>`;
}

window.selectOption = (idx) => { userAnswers[currentIdx] = idx; renderQuestion(); };

window.changeQuestion = (step) => {
    if (step === 1 && userAnswers[currentIdx] === null) return alert("Please select an answer!");
    if (currentIdx === questions.length - 1 && step === 1) return showResults();
    currentIdx += step;
    renderQuestion();
};

function showResults() {
    document.getElementById("quiz-screen").style.display = "none";
    document.getElementById("results-screen").style.display = "block";
    
    let correct = 0;
    let reviewHtml = "";

    questions.forEach((q, i) => {
        const isCorrect = userAnswers[i] === q.c;
        if (isCorrect) correct++;
        
        // Build review items (even for correct ones, if you want full list)
        reviewHtml += `<div class="review-item">
            <span class="review-q">${i+1}. ${q.q}</span>
            <span class="ans-pill ${isCorrect ? 'pill-correct' : 'pill-wrong'}">Your choice: ${q.a[userAnswers[i]]}</span>
            ${!isCorrect ? `<span class="ans-pill pill-correct">Correct: ${q.a[q.c]}</span>` : ''}
        </div>`;
    });

    document.getElementById("final-percent").innerText = `${Math.round((correct/50)*100)}%`;
    document.getElementById("review-area").innerHTML = reviewHtml;
}

window.toggleReview = () => {
    const area = document.getElementById("review-area");
    const btn = document.getElementById("reviewBtn");
    const isHidden = area.style.display === "none";
    area.style.display = isHidden ? "block" : "none";
    btn.innerText = isHidden ? "Hide Review" : "Review Answers";
    if(isHidden) area.scrollIntoView({ behavior: 'smooth' });
};

renderQuestion();
</script>
</body>
</html>
